name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble debug APK + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew executable
        run: chmod +x ./gradlew

      # Фиксированная debug-подпись: если keystore ещё нет в репозитории —
      # создаём его через keytool и коммитим один раз. Дальнейшие сборки
      # используют этот же файл, поэтому debug APK всегда имеет одинаковую
      # подпись и Android может обновлять его поверх без удаления.
      - name: Ensure debug.keystore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f debug.keystore ]; then
            echo "Generating debug.keystore..."
            keytool -genkey -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add debug.keystore
            git commit -m "chore: fixed debug keystore for consistent APK signature"
            git push
          else
            echo "debug.keystore already present, using existing."
          fi

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: metallist-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
