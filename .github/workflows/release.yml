name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Release AAB + APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      # Сборка release без подписи (debug-keystore); подпись — на этапе,
      # когда пользователь загрузит свой keystore в GitHub Secrets.
      - name: Assemble release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Bundle release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metallist-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
